  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100svh;
    }

    .hero {
      width: 100%;
      background: #111111;
      padding: 52px 0 36px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 10px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 28px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-name {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      color: #ffffff;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .hero-company {
      font-size: 11px;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .accent-line {
      width: 32px; height: 1.5px;
      background: #444;
      border-radius: 2px;
      margin-top: 20px;
    }

    .contacts {
      flex: 1;
      padding: 8px 0;
      background: #ffffff;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 420px;
      margin: 0 auto;
      padding: 16px 28px;
      text-decoration: none;
      border-bottom: 0.5px solid rgba(0,0,0,0.09);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .contact-link:last-child { border-bottom: none; }
    .contact-link:active { background: #f5f5f5; }

    .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: #111111;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg {
      width: 16px; height: 16px;
      fill: none;
      stroke: #aaa;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .contact-label { font-size: 10px; color: #999; letter-spacing: 0.07em; text-transform: uppercase; }
    .contact-value { font-size: 14px; color: #111; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chevron { margin-left: auto; flex-shrink: 0; }
    .chevron svg { width: 14px; height: 14px; fill: none; stroke: #ccc; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .card-footer {
      width: 100%;
      background: #111111;
      padding: 16px 0;
    }

    .footer-inner {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .footer-brand { font-size: 11px; color: #555; letter-spacing: 0.05em; }

    .save-btn {
      background: #fff;
      color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .save-btn:active { opacity: 0.75; }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 24px;
      white-space: nowrap;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (min-height: 700px) {
      .hero { padding-top: 64px; }
    }
  </style>
</head>
