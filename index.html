<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinesh — MA Construction & Design</title>
  <meta name="description" content="Contact Dinesh at MA Construction & Design, Chennai." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1c2b1e;
      --sage: #b4d2a0;
      --cream: #f7f4ef;
      --muted: #888;
      --border: rgba(28,43,30,0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .card {
      width: 100%;
      max-width: 420px;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--cream);
    }

    /* ── Hero ── */
    .hero {
      background: var(--forest);
      padding: 52px 28px 36px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(180,210,160,0.06);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 10px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(180,210,160,0.04);
      pointer-events: none;
    }

    .avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--sage);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--forest);
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .hero-name {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      color: var(--cream);
      line-height: 1.05;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .hero-company {
      font-size: 11px;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .accent-line {
      width: 32px; height: 2px;
      background: var(--sage);
      border-radius: 2px;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Contact rows ── */
    .contacts {
      padding: 8px 0;
      flex: 1;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 28px;
      text-decoration: none;
      border-bottom: 0.5px solid var(--border);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .contact-link:last-child { border-bottom: none; }
    .contact-link:active { background: rgba(28,43,30,0.04); }

    .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--forest);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg {
      width: 16px; height: 16px;
      fill: none;
      stroke: var(--sage);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .contact-label { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }
    .contact-value { font-size: 14px; color: var(--forest); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chevron { margin-left: auto; flex-shrink: 0; }
    .chevron svg { width: 14px; height: 14px; fill: none; stroke: #ccc; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    .card-footer {
      background: var(--forest);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .footer-brand { font-size: 11px; color: rgba(180,210,160,0.7); letter-spacing: 0.05em; }

    .save-btn {
      background: var(--sage);
      color: var(--forest);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 24px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .save-btn:active { opacity: 0.8; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--forest);
      color: var(--sage);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 24px;
      white-space: nowrap;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (min-height: 700px) {
      .hero { padding-top: 64px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="hero">
      <div class="avatar">D</div>
      <h1 class="hero-name">Dinesh</h1>
      <p class="hero-company">MA Construction &amp; Design</p>
      <div class="accent-line"></div>
    </div>

    <div class="contacts">

      <a class="contact-link" href="tel:+916381703191">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91A16 16 0 0015.1 17.9l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Phone</span>
          <span class="contact-value">+91 63817 03191</span>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="contact-link" href="mailto:dinesh@maconstructiondesign.com">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Email</span>
          <span class="contact-value">dinesh@maconstructiondesign.com</span>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="contact-link" href="https://maconstructiondesign.com" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Website</span>
          <span class="contact-value">maconstructiondesign.com</span>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="contact-link" href="https://maps.app.goo.gl/uFrR7H1TnLLFC1UW9?g_st=iw" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Address</span>
          <span class="contact-value">101, Medavakkam Main Rd, Chennai</span>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

    </div>

    <div class="card-footer">
      <span class="footer-brand">MA Construction &amp; Design</span>
      <button class="save-btn" onclick="saveContact()">Save contact</button>
    </div>

  </div>

  <div class="toast" id="toast">Contact saved!</div>

  <script>
    function saveContact() {
      const vcard = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "FN:Dinesh",
        "N:Dinesh;;;;",
        "ORG:MA Construction & Design",
        "TEL;TYPE=CELL:+916381703191",
        "EMAIL:dinesh@maconstructiondesign.com",
        "URL:https://maconstructiondesign.com",
        "ADR;TYPE=WORK:;;101\\, Medavakkam Main Road\\, Kumaran Nagar;Keelkattalai;Chennai;600117;India",
        "END:VCARD"
      ].join("\r\n");

      const blob = new Blob([vcard], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "dinesh-ma-construction.vcf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }
  </script>
</body>
</html>
